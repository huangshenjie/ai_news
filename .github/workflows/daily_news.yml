name: Daily AI News Push

on:
  schedule:
    # 每天北京时间 08:30 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点按钮测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 安装所有必要的库：请求、RSS解析、搜索、Google AI
      - name: Install dependencies
        run: |
          pip install requests feedparser tavily-python google-generativeai

      - name: Run script
        run: python ai_news.py
