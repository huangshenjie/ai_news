name: Daily AI News Push

# 触发条件配置
on:
  schedule:
    # 每天北京时间早上 08:30 运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 极其重要：允许手动点击运行，方便你现在立刻调试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v2

      # 2. 安装 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      # 3. 安装脚本运行必需的依赖库
      # 这里必须包含 requests (发请求) 和 feedparser (解析新闻源)
      - name: Install dependencies
        run: |
          pip install requests feedparser

      # 4. 执行你的 Python 脚本
      - name: Run script
        run: python ai_news.py
