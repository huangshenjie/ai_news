name: Daily AI News Push

on:
  schedule:
    # 每天北京时间 08:30
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 👇 注意：我们删掉了 google-genai，只保留最基础的库，越简单越稳定
      - name: Install dependencies
        run: |
          pip install requests tavily-python

      - name: Run script
        run: python ai_news.py
