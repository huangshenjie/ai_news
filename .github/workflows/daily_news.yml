name: Daily AI News Push

on:
  schedule:
    # 每天北京时间 08:30
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 升级 Python 到 3.11 以避免过时警告
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 安装最新的 Google 官方库 google-genai
      - name: Install dependencies
        run: |
          pip install requests tavily-python google-genai

      - name: Run script
        run: python ai_news.py
