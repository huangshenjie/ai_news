name: Daily AI News Push

on:
  schedule:
    # 每天北京时间早上 8:30 运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许你手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python ai_news.py
