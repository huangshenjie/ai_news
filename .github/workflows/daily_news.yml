name: Daily AI News Push

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 强制使用 Python 3.11 (解决旧版本警告)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 安装 Google 最新官方 SDK (google-genai)
      - name: Install dependencies
        run: |
          pip install requests tavily-python google-genai

      - name: Run script
        run: python ai_news.py
